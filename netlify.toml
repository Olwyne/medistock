# MediStock - Déploiement Netlify
# Build sur Netlify avec netlify-plugin-flutter.
# Définir SUPABASE_URL et SUPABASE_ANON_KEY dans Netlify (Environment variables).

[[plugins]]
  package = "netlify-plugin-flutter"
  [plugins.inputs]
    channel = "stable"

[build]
  command = "npm run build"
  publish = "build/web"

# Redirects SPA : toutes les routes vers index.html pour le routing Flutter
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
